<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metra Cloud - Gerador Pro Profissional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1e3a8a; /* Azul escuro Metra */
      --secondary: #10b981; /* Verde Metra */
      --accent: #dbeafe; /* Azul clarinho para fundos */
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --whatsapp-bg: #eae6df; /* Fundo chat WhatsApp */
      --whatsapp-msg: #fff; /* Balão mensagem WhatsApp */
      --radius: 16px;
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: 
        radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
        #f9fafb;
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 30px 20px;
      margin: 0;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.03);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .logo-badge {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      width: 45px; height: 45px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 20px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    .panel-title h1 { font-size: 20px; margin: 0; color: var(--primary); font-weight: 700; }
    .panel-title span { font-size: 13px; color: var(--muted); }

    .input-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
    
    input, textarea {
      width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      font-size: 15px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }

    input:focus, textarea:focus { 
      border-color: var(--primary); 
      outline: none; 
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

    .btn-copy {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #1e40af);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -3px rgba(30, 58, 138, 0.4); }
    .btn-copy:active { transform: translateY(0); }

    /* WHATSAPP SIMULATOR */
    .whatsapp-container {
      background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Padrão fundo WhatsApp */
      background-color: var(--whatsapp-bg);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }

    .whatsapp-message {
      background: var(--whatsapp-msg);
      border-radius: 0 12px 12px 12px;
      padding: 20px;
      max-width: 90%;
      margin-left: auto; /* Alinha à direita como se fosse enviada */
      position: relative;
      font-size: 15px;
      line-height: 1.5;
      color: #111b21;
      white-space: pre-wrap;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .whatsapp-message::before {
      content: "";
      position: absolute;
      top: 0; right: -10px;
      width: 0; height: 0;
      border-style: solid;
      border-width: 10px 10px 0 0;
      border-color: var(--whatsapp-msg) transparent transparent transparent;
    }

    .config-trigger {
      background: var(--accent);
      border: 1px solid #bfdbfe;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 12px;
      width: 100%;
      text-align: left;
      margin-bottom: 15px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .config-trigger::after { content: "▼"; font-size: 10px; opacity: 0.5; }

    #config-area { display: none; margin-top: 10px; padding: 15px; border-radius: 10px; background: #f3f4f6; border: 1px solid var(--border); }
    #config-area.open { display: block; }

    /* Custom Checkbox */
    .check-group { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: #fff; padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
    .check-group input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--secondary); cursor: pointer; }
    .check-group label { margin: 0; font-size: 14px; text-transform: none; color: var(--text); font-weight: 500; letter-spacing: normal;}

    @media (max-width: 900px) {
      .app-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="panel">
    <div class="panel-header">
      <div class="logo-badge">M</div>
      <div class="panel-title">
        <h1>Metra Propostas</h1>
        <span>Gerador Comercial WhatsApp • v1.5</span>
      </div>
    </div>
    
    <div class="row">
      <div class="input-group">
        <label>👥 Usuários</label>
        <input type="number" id="usuarios" value="1" min="1">
      </div>
      <div class="input-group">
        <label>🗓 Validade</label>
        <input type="text" id="validade" value="27/03">
      </div>
    </div>

    <button class="config-trigger" onclick="document.getElementById('config-area').classList.toggle('open')">
      ⚙️ Ajustar Preços Base (Licença/Mensalidade)
    </button>

    <div id="config-area">
      <div class="input-group">
        <label>Implantação Fixo (R$)</label>
        <input type="number" id="impl" value="480">
      </div>
      <div class="row">
        <div class="input-group">
          <label>Op1 Base (1º User)</label>
          <input type="number" id="op1" value="200">
        </div>
        <div class="input-group">
          <label>Op1 Adicional (p/ User)</label>
          <input type="number" id="op1_adic" value="75">
        </div>
      </div>
      <div class="row">
        <div class="input-group">
          <label>Op2 Base (1º User)</label>
          <input type="number" id="op2" value="259.90">
        </div>
        <div class="input-group">
          <label>Op2 Adicional (p/ User)</label>
          <input type="number" id="op2_adic" value="100">
        </div>
      </div>
    </div>

    <div class="check-group">
      <input type="checkbox" id="showCanal" checked>
      <label>➕ Incluir Canal de Denúncia (+R$49,90)</label>
    </div>

    <div class="check-group">
      <input type="checkbox" id="showIA" checked>
      <label>🤖 Incluir Bloco de Inteligência Artificial</label>
    </div>

    <button class="btn-copy" id="btnCopiar" onclick="copiar()">
      <span>📋</span> COPIAR PARA WHATSAPP
    </button>
  </div>

  <div class="panel" style="padding: 10px;">
    <div style="padding: 15px 15px 5px; font-size: 13px; color: var(--muted); font-weight: 600;">PRÉ-VISUALIZAÇÃO NO CELULAR (SENTIDO ENVIADO)</div>
    <div class="whatsapp-container">
      <div id="preview" class="whatsapp-message"></div>
    </div>
  </div>
</div>

<script>
  // -- LÓGICA MANTIDA CONFORME SOLICITADO --
  const ids = ['usuarios', 'validade', 'impl', 'op1', 'op1_adic', 'op2', 'op2_adic', 'showIA', 'showCanal'];
  
  function format(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function atualizar() {
    const d = {};
    ids.forEach(id => {
      const el = document.getElementById(id);
      d[id] = el.type === 'checkbox' ? el.checked : el.value;
    });

    const n = parseInt(d.usuarios) || 1;
    const adic = n - 1;

    const vImpl = parseFloat(d.impl) || 0;
    const vOp1 = (parseFloat(d.op1) || 0) + (adic * (parseFloat(d.op1_adic) || 0));
    const vOp2 = (parseFloat(d.op2) || 0) + (adic * (parseFloat(d.op2_adic) || 0));

    let txt = `📄 Proposta – METRA CLOUD (${n.toString().padStart(2, '0')} usuário${n > 1 ? 's' : ''})\n\n`;
    
    txt += `💰 *Licença + capacitação*\n`;
    txt += `De R$ 1.500,00 ➝ ${format(vImpl)}\n`;
    txt += `ou 10x de ${format(vImpl/10)}\n\n`;

    txt += `🔹 *Opção 01 – Sistema (sem Faturamento e Financeiro)*\n`;
    txt += `*${format(vOp1)} / mês*\n\n`;

    txt += `⭐ *Opção 02 – Sistema completo (com Faturamento e Financeiro)*\n`;
    txt += `*${format(vOp2)} / mês*\n\n`;

    if(d.showCanal) {
      txt += `➕ *Canal de Denúncia*\n`;
      txt += `R$ 49,90 / mês por empresa\n`;
      txt += `💡 Pode ser ofertado para sua base como serviço adicional, gerando receita recorrente\n\n`;
    }

    if(d.showIA) {
      txt += `🤖 *Em breve: IA* que, ao cadastrar a empresa, sugere automaticamente setores e funções com base no CNAE\n\n`;
    }

    txt += `🔓 *Liberação em 1 dia útil*\n`;
    txt += `🗓 *Condição válida até ${d.validade}*`;

    document.getElementById('preview').textContent = txt;
  }

  function copiar() {
    const text = document.getElementById('preview').textContent;
    const btn = document.getElementById('btnCopiar');
    
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = "<span>✅</span> COPIADO COM SUCESSO!";
      btn.style.background = "linear-gradient(135deg, #166534, #15803d)"; // Verde escuro
      btn.style.boxShadow = "0 10px 15px -3px rgba(22, 101, 52, 0.3)";
      setTimeout(() => {
        btn.innerHTML = "<span>📋</span> COPIAR PARA WHATSAPP";
        btn.style.background = ""; // Volta para o CSS original
        btn.style.boxShadow = "";
      }, 2000);
    });
  }

  // Event Listeners
  ids.forEach(id => document.getElementById(id).addEventListener('input', atualizar));
  
  // Inicialização
  atualizar();
</script>

</body>
</html>

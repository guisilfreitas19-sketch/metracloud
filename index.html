<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metra Cloud - Gerador Comercial</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1e40af;
      --secondary: #10b981;
      --bg: #f3f4f6;
      --text: #111827;
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 950px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      border: 1px solid #e5e7eb;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; font-size: 20px;
    }

    h1 { font-size: 18px; margin: 0; color: var(--primary); }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    input:focus { border-color: var(--primary); ring: 2px var(--primary); }

    .btn-copy {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn-copy:hover { background: #1e3a8a; transform: translateY(-1px); }

    /* Estilo WhatsApp Preview */
    .wa-preview-container {
      background: #e5ddd5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      border-radius: 16px;
      padding: 20px;
      height: 100%;
      min-height: 500px;
      border: 1px solid #d1d5db;
    }

    .wa-bubble {
      background: white;
      padding: 15px;
      border-radius: 8px 18px 18px 18px;
      max-width: 90%;
      font-size: 14.5px;
      line-height: 1.5;
      color: #111b21;
      white-space: pre-wrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      position: relative;
    }

    .wa-bubble::before {
      content: "";
      position: absolute;
      left: -10px; top: 0;
      border-style: solid;
      border-width: 0 10px 10px 0;
      border-color: transparent white transparent transparent;
    }

    .config-box {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #f3f4f6;
    }

    .toggle-config {
      background: #f3f4f6;
      border: none;
      width: 100%;
      padding: 8px;
      font-size: 11px;
      color: #9ca3af;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="logo-area">
      <div class="logo-box">M</div>
      <div>
        <h1>Metra Cloud</h1>
        <small style="color: #9ca3af">Gerador WhatsApp v1.6</small>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div class="field">
        <label>👥 Usuários</label>
        <input type="number" id="usuarios" value="1" min="1">
      </div>
      <div class="field">
        <label>🗓 Validade</label>
        <input type="text" id="validade" value="10/04">
      </div>
    </div>

    <button class="toggle-config" onclick="document.getElementById('conf').style.display = document.getElementById('conf').style.display === 'none' ? 'block' : 'none'">
      MOSTRAR CONFIGURAÇÃO DE PREÇOS
    </button>

    <div id="conf" style="display: none;" class="config-box">
      <div class="field">
        <label>Implantação (R$)</label>
        <input type="number" id="impl" value="480">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="field"><label>Op1 Base</label><input type="number" id="op1" value="250"></div>
        <div class="field"><label>Op1 Adic.</label><input type="number" id="op1_adic" value="75"></div>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="field"><label>Op2 Base</label><input type="number" id="op2" value="299.90"></div>
        <div class="field"><label>Op2 Adic.</label><input type="number" id="op2_adic" value="100"></div>
      </div>
    </div>

    <div class="field" style="display:flex; align-items:center; gap:8px; background: #f9fafb; padding:10px; border-radius:8px;">
      <input type="checkbox" id="showCanal" checked style="width:18px; height:18px;">
      <label style="margin:0; text-transform:none;">Exibir Canal de Denúncia</label>
    </div>

    <div class="field" style="display:flex; align-items:center; gap:8px; background: #f9fafb; padding:10px; border-radius:8px;">
      <input type="checkbox" id="showIA" checked style="width:18px; height:18px;">
      <label style="margin:0; text-transform:none;">Exibir Spoiler IA</label>
    </div>

    <button class="btn-copy" id="btnCopiar" onclick="copiar()">
      COPIAR PROPOSTA
    </button>
  </div>

  <div class="wa-preview-container">
    <div style="font-size: 11px; color: #54656f; font-weight: 700; margin-bottom: 10px; text-align: center;">PRÉ-VISUALIZAÇÃO NO WHATSAPP</div>
    <div id="preview" class="wa-bubble"></div>
  </div>
</div>

<script>
  const ids = ['usuarios', 'validade', 'impl', 'op1', 'op1_adic', 'op2', 'op2_adic', 'showIA', 'showCanal'];
  
  function format(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function atualizar() {
    const d = {};
    ids.forEach(id => {
      const el = document.getElementById(id);
      d[id] = el.type === 'checkbox' ? el.checked : el.value;
    });

    const n = parseInt(d.usuarios) || 1;
    const adic = n - 1;

    const vImpl = parseFloat(d.impl) || 0;
    const vOp1 = (parseFloat(d.op1) || 0) + (adic * (parseFloat(d.op1_adic) || 0));
    const vOp2 = (parseFloat(d.op2) || 0) + (adic * (parseFloat(d.op2_adic) || 0));

    let txt = `📄 Proposta – METRA CLOUD (${n.toString().padStart(2, '0')} usuário${n > 1 ? 's' : ''})\n\n`;
    
    txt += `💰 *Licença + capacitação*\n`;
    txt += `De R$ 1.500,00 ➝ *${format(vImpl)}*\n`;
    txt += `ou 10x de ${format(vImpl/10)}\n\n`;

    txt += `🔹 *Opção 01 – Sistema (sem Faturamento e Financeiro)*\n`;
    txt += `*${format(vOp1)} / mês*\n\n`;

    txt += `⭐ *Opção 02 – Sistema completo (com Faturamento e Financeiro)*\n`;
    txt += `*${format(vOp2)} / mês*\n\n`;

    if(d.showCanal) {
      txt += `➕ *Canal de Denúncia*\n`;
      txt += `*R$ 49,90 / mês por empresa*\n`;
      txt += `💡 Pode ser ofertado para sua base como serviço adicional, gerando receita recorrente\n\n`;
    }

    if(d.showIA) {
      txt += `🤖 *Em breve:* IA que, ao cadastrar a empresa, sugere automaticamente setores e funções com base no CNAE\n\n`;
    }

    txt += `🔓 *Liberação em 1 dia útil*\n`;
    txt += `🗓 *Condição válida até ${d.validade}*`;

    document.getElementById('preview').textContent = txt;
  }

  function copiar() {
    const text = document.getElementById('preview').textContent;
    const btn = document.getElementById('btnCopiar');
    
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "✅ COPIADO!";
      btn.style.background = "#10b981";
      setTimeout(() => {
        btn.textContent = "COPIAR PROPOSTA";
        btn.style.background = "";
      }, 2000);
    });
  }

  ids.forEach(id => document.getElementById(id).addEventListener('input', atualizar));
  atualizar();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metra Cloud - Gerador WhatsApp</title>
  <style>
    :root {
      --bg: #070a13;
      --card: #101625;
      --accent: #22c55e;
      --blue: #3b82f6;
      --text: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h2 { font-size: 18px; margin-top: 0; color: var(--blue); }

    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; margin-bottom: 5px; color: #94a3b8; font-weight: bold; }
    
    input, textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      color: white;
      font-size: 14px;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-copy {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #052e16;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-copy:active { transform: scale(0.98); }

    .preview-box {
      background: #0b141a; /* Cor do fundo do WhatsApp Dark */
      border-radius: 12px;
      padding: 20px;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.5;
      color: #e9edef;
      border-left: 4px solid var(--accent);
    }

    .config-trigger {
      background: none;
      border: none;
      color: #64748b;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      margin-bottom: 10px;
    }

    #config-area { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #334155; }
    #config-area.open { display: block; }

    @media (max-width: 768px) {
      .app-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="panel">
    <h2>🚀 Gerador Metra</h2>
    
    <div class="row">
      <div class="input-group">
        <label>Usuários</label>
        <input type="number" id="usuarios" value="1" min="1">
      </div>
      <div class="input-group">
        <label>Validade</label>
        <input type="text" id="validade" value="27/03">
      </div>
    </div>

    <button class="config-trigger" onclick="document.getElementById('config-area').classList.toggle('open')">
      ⚙️ Ajustar Preços Base
    </button>

    <div id="config-area">
      <div class="input-group">
        <label>Implantação (R$)</label>
        <input type="number" id="impl" value="480">
      </div>
      <div class="row">
        <div class="input-group">
          <label>Op1 Base</label>
          <input type="number" id="op1" value="200">
        </div>
        <div class="input-group">
          <label>Op1 Adicional</label>
          <input type="number" id="op1_adic" value="75">
        </div>
      </div>
      <div class="row">
        <div class="input-group">
          <label>Op2 Base</label>
          <input type="number" id="op2" value="259.90">
        </div>
        <div class="input-group">
          <label>Op2 Adicional</label>
          <input type="number" id="op2_adic" value="100">
        </div>
      </div>
    </div>

    <div class="input-group" style="display:flex; align-items:center; gap:10px; margin-top:15px;">
      <input type="checkbox" id="showIA" checked style="width:20px; height:20px;">
      <label style="margin:0">Incluir Bloco IA</label>
    </div>

    <div class="input-group" style="display:flex; align-items:center; gap:10px;">
      <input type="checkbox" id="showCanal" checked style="width:20px; height:20px;">
      <label style="margin:0">Incluir Canal Denúncia</label>
    </div>

    <button class="btn-copy" id="btnCopiar" onclick="copiar()">COPIAR PARA WHATSAPP</button>
  </div>

  <div class="panel">
    <label>PRÉ-VISUALIZAÇÃO (WHATSAPP)</label>
    <div id="preview" class="preview-box"></div>
  </div>
</div>

<script>
  const ids = ['usuarios', 'validade', 'impl', 'op1', 'op1_adic', 'op2', 'op2_adic', 'showIA', 'showCanal'];
  
  function format(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function atualizar() {
    const d = {};
    ids.forEach(id => {
      const el = document.getElementById(id);
      d[id] = el.type === 'checkbox' ? el.checked : el.value;
    });

    const n = parseInt(d.usuarios) || 1;
    const adic = n - 1;

    const vImpl = parseFloat(d.impl);
    const vOp1 = parseFloat(d.op1) + (adic * parseFloat(d.op1_adic));
    const vOp2 = parseFloat(d.op2) + (adic * parseFloat(d.op2_adic));

    let txt = `📄 Proposta – METRA CLOUD (${n.toString().padStart(2, '0')} usuário${n > 1 ? 's' : ''})\n\n`;
    
    txt += `💰 Licença + capacitação\n`;
    txt += `De R$ 1.500,00 ➝ ${format(vImpl)}\n`;
    txt += `ou 10x de ${format(vImpl/10)}\n\n`;

    txt += `🔹 Opção 01 – Sistema (sem Faturamento e Financeiro)\n`;
    txt += `${format(vOp1)} / mês\n\n`;

    txt += `⭐ Opção 02 – Sistema completo (com Faturamento e Financeiro)\n`;
    txt += `${format(vOp2)} / mês\n\n`;

    if(d.showCanal) {
      txt += `➕ Canal de Denúncia\n`;
      txt += `R$ 49,90 / mês por empresa\n`;
      txt += `💡 Pode ser ofertado para sua base como serviço adicional, gerando receita recorrente\n\n`;
    }

    if(d.showIA) {
      txt += `🤖 Em breve: IA que, ao cadastrar a empresa, sugere automaticamente setores e funções com base no CNAE\n\n`;
    }

    txt += `🔓 Liberação em 1 dia útil\n`;
    txt += `🗓 Condição válida até ${d.validade}`;

    document.getElementById('preview').textContent = txt;
  }

  function copiar() {
    const text = document.getElementById('preview').textContent;
    const btn = document.getElementById('btnCopiar');
    
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "✅ COPIADO!";
      btn.style.background = "#15803d";
      setTimeout(() => {
        btn.textContent = "COPIAR PARA WHATSAPP";
        btn.style.background = "";
      }, 2000);
    });
  }

  ids.forEach(id => document.getElementById(id).addEventListener('input', atualizar));
  atualizar();
</script>

</body>
</html>
